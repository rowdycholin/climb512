services:
  web:
    build:
      context: ./app
      target: deps
    command: >
      sh -c "if [ ! -x node_modules/.bin/next ]; then npm ci; fi;
      npx prisma generate;
      npm run dev -- --hostname 0.0.0.0 --port 8080"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./app:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next

volumes:
  web_node_modules:
  web_next_cache:
