services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: climber
      POSTGRES_PASSWORD: climber512
      POSTGRES_DB: climbapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  migrate:
    image: postgres:16-alpine
    command: >
      sh -c "until pg_isready -h postgres -U climber -d climbapp; do sleep 1; done;
      for f in $$(ls /migrations/*/migration.sql | sort); do
        psql postgresql://climber:climber512@postgres:5432/climbapp -f $$f || true;
      done"
    volumes:
      - ./app/prisma/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_started
    restart: on-failure

  web:
    build:
      context: ./app
      target: runner
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./app/.env
    environment:
      DATABASE_URL: postgresql://climber:climber512@postgres:5432/climbapp
      SESSION_SECRET: super-secret-session-key-change-in-production-32chars!!
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
