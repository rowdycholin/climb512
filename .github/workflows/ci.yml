name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            testing/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Type-check app
        working-directory: app
        run: npx tsc --noEmit

      - name: Install Playwright dependencies
        working-directory: testing
        run: npm ci

      - name: Install Chromium
        working-directory: testing
        run: npx playwright install --with-deps chromium

      - name: Create CI app env file
        run: |
          printf '%s\n' \
            'ANTHROPIC_API_KEY=simulator' \
            'ANTHROPIC_BASE_URL=http://simulator:8787' \
            > app/.env

      - name: Start simulator-backed stack
        run: docker compose up --build -d
        env:
          AI_MODE: simulate
          ANTHROPIC_API_KEY: simulator
          ANTHROPIC_BASE_URL: http://simulator:8787
          AI_SIMULATOR_SEED: ci-seed
          AI_SIMULATOR_SCENARIO: baseline

      - name: Wait for web
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/login >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --tail=100
          exit 1

      - name: Run Playwright tests
        working-directory: testing
        run: npm run test:ci

      - name: Show Docker logs
        if: always()
        run: docker compose logs --tail=100

      - name: Stop stack
        if: always()
        run: docker compose down -v
